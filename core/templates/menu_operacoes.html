{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemática - Operações</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; position: relative; background-color: #026873;
            padding: 20px;
        }
        .fundo-imagem {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(2, 104, 115, 0.45), rgba(2, 104, 115, 0.45)),
                url('{% static "img/imagemfundo1.png" %}');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .caixa {
            position: relative; z-index: 2;
            background-color: rgba(1, 45, 50, 0.6);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 20px; padding: 40px 35px; width: 560px; max-width: 92vw;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #ffd54f; font-size: 1.5em; margin-bottom: 28px; }
        .grade-operacoes {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        a.operacao {
            background-color: #e8e8e0; color: #1c2b22; padding: 22px 8px;
            border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 1em;
            transition: transform 0.15s; display: block; border: 3px solid transparent;
            flex: 1 1 150px; max-width: 200px;
        }
        a.operacao:hover { transform: translateY(-4px); border-color: #f4b400; }
        a.operacao .simbolo { display: block; font-size: 2em; margin-bottom: 8px; }
        a.voltar { display: inline-block; margin-top: 26px; color: #e8e8e0; text-decoration: none; font-size: 0.9em; }
        a.voltar:hover { text-decoration: underline; }
        @media (max-width: 420px) {
            }
    </style>
</head>
<body>
    <div class="fundo-imagem"></div>
    <div class="caixa">
        <h1>🧮 Matemática — Escolha a Operação</h1>
        <div class="grade-operacoes">
            <a class="operacao" href="{% url 'niveis_operacao' 'adicao' %}">
                <span class="simbolo">➕</span>Adição
            </a>
            <a class="operacao" href="{% url 'niveis_operacao' 'subtracao' %}">
                <span class="simbolo">➖</span>Subtração
            </a>
            <a class="operacao" href="{% url 'niveis_operacao' 'multiplicacao' %}">
                <span class="simbolo">✖️</span>Multiplicação
            </a>
            <a class="operacao" href="{% url 'niveis_operacao' 'divisao' %}">
                <span class="simbolo">➗</span>Divisão
            </a>
            <a class="operacao" href="{% url 'niveis_operacao' 'potenciacao' %}">
                <span class="simbolo">🔺</span>Potenciação
            </a>
            <a class="operacao" href="{% url 'jogo_tabuada' 'radiciacao' 'raizes' %}">
                <span class="simbolo">√</span>Radiciação
            </a>
        </div>
        <a class="voltar" href="{% url 'menu_matematica' %}">⬅ Voltar</a>
    </div>
</body>
</html>
