{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Educação - Escolha o Ano</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            position: relative;
            overflow: hidden;
            background-color: #026873;
        }

        .fundo-imagem {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(2, 104, 115, 0.45), rgba(2, 104, 115, 0.45)),
                url('{% static "img/imagemfundo1.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .caixa {
            position: relative;
            z-index: 2;
            background-color: rgba(1, 45, 50, 0.6);
            backdrop-filter: blur(2px);
            border: 2px dashed rgba(255,255,255,0.35);
            border-radius: 20px;
            padding: 45px 40px;
            width: 480px;
            max-width: 92vw;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.5em; margin: 0 0 8px; color: #ffd54f; }
        p.subtitulo { margin: 0 0 30px; color: #e8e8e0; }

        .grade-anos {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        button.ano {
            padding: 18px 0;
            border-radius: 12px;
            border: none;
            background-color: #f4b400;
            color: #2c1e00;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s, background-color 0.15s;
        }
        button.ano:hover { background-color: #ffcb3d; transform: scale(1.06); }

        a.sair {
            display: inline-block; margin-top: 28px; color: #e8e8e0;
            font-size: 0.9em; text-decoration: none;
        }
        a.sair:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .grade-anos { grid-template-columns: repeat(3, 1fr); }
            button.ano { padding: 16px 0; font-size: 1.15em; }
        }
    </style>
</head>
<body>
    <div class="fundo-imagem"></div>

    <div class="caixa">
        <h1>👋 Olá, {{ request.user.first_name|default:request.user.username }}!</h1>
        <p class="subtitulo">Em qual ano você está?</p>

        <form method="POST" action="{% url 'selecionar_ano' %}">
            {% csrf_token %}
            <div class="grade-anos">
                <button type="submit" name="ano" value="1" class="ano">1º</button>
                <button type="submit" name="ano" value="2" class="ano">2º</button>
                <button type="submit" name="ano" value="3" class="ano">3º</button>
                <button type="submit" name="ano" value="4" class="ano">4º</button>
                <button type="submit" name="ano" value="5" class="ano">5º</button>
            </div>
        </form>

        <a class="sair" href="{% url 'logout' %}">Sair</a>
    </div>
</body>
</html>
