{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Português</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; position: relative; background-color: #4a1942;
            padding: 20px;
        }
        .fundo-imagem {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(74, 25, 66, 0.5), rgba(74, 25, 66, 0.5)),
                url('{% static "img/fundoport.png" %}');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .caixa {
            position: relative; z-index: 2;
            background-color: rgba(40, 14, 36, 0.6);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 20px; padding: 40px 35px; width: 620px; max-width: 92vw;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #ffd54f; font-size: 1.6em; margin-bottom: 28px; }
        .grade-modulos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        a.modulo {
            background-color: #e8e8e0; color: #2c1e28; padding: 22px 10px;
            border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.98em;
            transition: transform 0.15s; display: block; border: 3px solid transparent;
        }
        a.modulo:hover { transform: translateY(-4px); border-color: #f4b400; }
        a.modulo .icone { display: block; font-size: 2.2em; margin-bottom: 8px; }
        a.voltar { display: inline-block; margin-top: 26px; color: #e8e8e0; text-decoration: none; font-size: 0.9em; }
        a.voltar:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .grade-modulos { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="fundo-imagem"></div>
    <div class="caixa">
        <h1>📚 Português — Escolha o Módulo</h1>
        <div class="grade-modulos">
            <a class="modulo" href="{% url 'portugues_quiz' 'ortografia' %}">
                <span class="icone">✏️</span>Ortografia
            </a>
            <a class="modulo" href="{% url 'portugues_quiz' 'sinonimos_antonimos' %}">
                <span class="icone">🔄</span>Sinônimos e Antônimos
            </a>
            <a class="modulo" href="{% url 'portugues_quiz' 'encontros_vocalicos' %}">
                <span class="icone">🔤</span>Encontros Vocálicos
            </a>
            <a class="modulo" href="{% url 'portugues_quiz' 'digrafos' %}">
                <span class="icone">🔠</span>Dígrafos
            </a>
            <a class="modulo" href="{% url 'portugues_quiz' 'classificacao_silabica' %}">
                <span class="icone">🎵</span>Classificação Silábica
            </a>
            <a class="modulo" href="{% url 'portugues_quiz' 'encontros_consonantais' %}">
                <span class="icone">🔗</span>Encontros Consonantais
            </a>
            <a class="modulo" href="{% url 'portugues_quiz' 'substantivos_adjetivos' %}">
                <span class="icone">🏷️</span>Substantivos e Adjetivos
            </a>
            <a class="modulo" href="{% url 'portugues_quiz' 'tipos_de_frase' %}">
                <span class="icone">💬</span>Tipos de Frase
            </a>
        </div>
        <a class="voltar" href="{% url 'home' %}">⬅ Voltar ao início</a>
    </div>
</body>
</html>
