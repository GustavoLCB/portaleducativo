{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inglês</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; position: relative; background-color: #0d3b66;
            padding: 20px;
        }
        .fundo-imagem {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(13, 59, 102, 0.5), rgba(13, 59, 102, 0.5)),
                url('{% static "img/fundoing.png" %}');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .caixa {
            position: relative; z-index: 2;
            background-color: rgba(6, 30, 54, 0.6);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 20px; padding: 40px 35px; width: 520px; max-width: 92vw;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #ffd54f; font-size: 1.6em; margin-bottom: 28px; }
        .grade-modulos {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        a.modulo {
            background-color: #e8e8e0; color: #0d2035; padding: 24px 12px;
            border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 1em;
            transition: transform 0.15s; display: block; border: 3px solid transparent;
            flex: 1 1 150px; max-width: 200px;
        }
        a.modulo:hover { transform: translateY(-4px); border-color: #f4b400; }
        a.modulo .icone { display: block; font-size: 2.3em; margin-bottom: 8px; }
        a.voltar { display: inline-block; margin-top: 26px; color: #e8e8e0; text-decoration: none; font-size: 0.9em; }
        a.voltar:hover { text-decoration: underline; }
        @media (max-width: 420px) {
            }
    </style>
</head>
<body>
    <div class="fundo-imagem"></div>
    <div class="caixa">
        <h1>
            <svg width="34" height="28" viewBox="0 0 100 80" style="display:inline-block; vertical-align:middle; margin-right:6px;">
                <g transform="translate(2,6) rotate(-8 40 28)">
                    <rect x="0" y="0" width="62" height="42" rx="3" fill="#00247d"/>
                    <path d="M0 0 L62 42 M62 0 L0 42" stroke="#ffffff" stroke-width="7"/>
                    <path d="M0 0 L62 42 M62 0 L0 42" stroke="#cf142b" stroke-width="3"/>
                    <path d="M31 0 L31 42 M0 21 L62 21" stroke="#ffffff" stroke-width="12"/>
                    <path d="M31 0 L31 42 M0 21 L62 21" stroke="#cf142b" stroke-width="6"/>
                </g>
                <g transform="translate(36,30) rotate(8 40 28)">
                    <rect x="0" y="0" width="62" height="42" rx="3" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
                    <rect x="0" y="0" width="62" height="3.2" fill="#b22234"/>
                    <rect x="0" y="6.4" width="62" height="3.2" fill="#b22234"/>
                    <rect x="0" y="12.8" width="62" height="3.2" fill="#b22234"/>
                    <rect x="0" y="19.2" width="62" height="3.2" fill="#b22234"/>
                    <rect x="0" y="25.6" width="62" height="3.2" fill="#b22234"/>
                    <rect x="0" y="32" width="62" height="3.2" fill="#b22234"/>
                    <rect x="0" y="38.4" width="62" height="3.2" fill="#b22234"/>
                    <rect x="0" y="0" width="26" height="22.4" fill="#3c3b6e"/>
                </g>
            </svg>
            Inglês — Escolha o Módulo
        </h1>
        <div class="grade-modulos">
            <a class="modulo" href="{% url 'ingles_quiz' 'weather_clothes' %}">
                <span class="icone">☀️</span>Weather & Clothes
            </a>
            <a class="modulo" href="{% url 'ingles_quiz' 'atividades_like' %}">
                <span class="icone">🏃</span>Atividades
            </a>
            <a class="modulo" href="{% url 'ingles_quiz' 'vocabulario_geral' %}">
                <span class="icone">📖</span>Vocabulário Geral
            </a>
            <a class="modulo" href="{% url 'ingles_quiz' 'esportes_convites' %}">
                <span class="icone">⚽</span>Esportes e Convites
            </a>
            <a class="modulo" href="{% url 'ingles_quiz' 'vocabulario_visual' %}">
                <span class="icone">🖼️</span>Vocabulário Visual
            </a>
        </div>
        <a class="voltar" href="{% url 'home' %}">⬅ Voltar ao início</a>
    </div>
</body>
</html>
