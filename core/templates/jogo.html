{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplicação - Jogo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; position: relative; background-color: #026873;
            padding: 20px;
        }
        .fundo-imagem {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(2, 104, 115, 0.45), rgba(2, 104, 115, 0.45)),
                url('{% static "img/imagemfundo1.png" %}');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .caixa {
            position: relative; z-index: 2;
            background-color: rgba(1, 45, 50, 0.6);
            border: 2px dashed rgba(255,255,255,0.35);
            border-radius: 20px; padding: 40px 30px; width: 460px; max-width: 92vw;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #ffd54f; font-size: 1.3em; margin: 0 0 25px; text-transform: capitalize; }
        .conta { font-size: 2.6em; font-weight: bold; margin-bottom: 25px; }
        input#resposta {
            width: 140px; padding: 12px; font-size: 1.4em; text-align: center;
            border-radius: 10px; border: none; background-color: #fdf6e3; color: #2c3e50;
        }
        button.enviar {
            display: block; margin: 18px auto 0; padding: 12px 30px;
            background-color: #f4b400; color: #2c1e00; border: none; border-radius: 10px;
            font-size: 1.1em; font-weight: bold; cursor: pointer;
        }
        button.enviar:hover { background-color: #ffcb3d; }
        .feedback { margin-top: 18px; font-size: 1.2em; font-weight: bold; min-height: 30px; }
        .feedback.certo { color: #6fdc8c; }
        .feedback.errado { color: #ff8a80; }
        .placar { margin-top: 20px; font-size: 0.95em; color: #e8e8e0; }
        .tela-fim { display: none; }
        .tela-fim h2 { color: #ffd54f; }
        .botoes-fim { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .botoes-fim a {
            padding: 12px 22px; border-radius: 10px; text-decoration: none; font-weight: bold;
        }
        .btn-repetir { background-color: #f4b400; color: #2c1e00; }
        .btn-repetir:hover { background-color: #ffcb3d; }
        .btn-voltar { background-color: #444; color: #ffffff; }
        .btn-voltar:hover { background-color: #666; }
    </style>
</head>
<body>
    <div class="fundo-imagem"></div>

    <div class="caixa" id="tela-jogo">
        <h1>{{ nome_operacao }} — {{ nivel }}</h1>
        <div class="conta" id="conta"></div>
        <form id="form-resposta" autocomplete="off">
            <input type="number" id="resposta" required autofocus>
            <button type="submit" class="enviar">Responder</button>
        </form>
        <div class="feedback" id="feedback"></div>
        <div class="placar">Questão <span id="num-atual">1</span>/10 — Acertos: <span id="num-acertos">0</span></div>
    </div>

    <div class="caixa tela-fim" id="tela-fim">
        <h2>🎉 Fim de jogo!</h2>
        <p>Você acertou <strong id="resumo-acertos"></strong> de 10 perguntas.</p>
        <div class="botoes-fim">
            <a class="btn-repetir" href="{% url 'jogo_tabuada' operacao nivel %}">🔁 Jogar de novo</a>
            {% if operacao == 'radiciacao' %}
                <a class="btn-voltar" href="{% url 'menu_operacoes' %}">⬅ Escolher outra operação</a>
            {% else %}
                <a class="btn-voltar" href="{% url 'niveis_operacao' operacao %}">⬅ Escolher outro nível</a>
            {% endif %}
        </div>
    </div>

    <script>
        const nivel = "{{ nivel }}";
        const operacao = "{{ operacao }}";
        const totalQuestoes = 10;

        let questaoAtual = 0;
        let acertos = 0;
        let numero1, numero2, respostaCorreta;
        let inicioQuestao;

        function sortear(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function gerarQuestao() {
            // Cada operação tem sua própria lógica de sorteio dos números.
            if (operacao === 'adicao') {
                const faixas = { unidades: [1, 9], dezenas: [10, 99], centenas: [100, 999] };
                const [min, max] = faixas[nivel] || faixas.unidades;
                numero1 = sortear(min, max);
                numero2 = sortear(min, max);
                respostaCorreta = numero1 + numero2;
                return `${numero1} + ${numero2} = ?`;
            }

            if (operacao === 'subtracao') {
                const faixas = { unidades: [1, 9], dezenas: [10, 99], centenas: [100, 999] };
                const [min, max] = faixas[nivel] || faixas.unidades;
                numero1 = sortear(min, max);
                numero2 = sortear(min, max);
                if (numero2 > numero1) { const t = numero1; numero1 = numero2; numero2 = t; } // evita resultado negativo
                respostaCorreta = numero1 - numero2;
                return `${numero1} − ${numero2} = ?`;
            }

            if (operacao === 'multiplicacao') {
                const faixas = {
                    unidades: { min1: 1, max1: 9, min2: 1, max2: 9 },
                    dezenas:  { min1: 10, max1: 99, min2: 2, max2: 9 },
                    centenas: { min1: 100, max1: 999, min2: 2, max2: 9 },
                };
                const f = faixas[nivel] || faixas.unidades;
                numero1 = sortear(f.min1, f.max1);
                numero2 = sortear(f.min2, f.max2);
                respostaCorreta = numero1 * numero2;
                return `${numero1} × ${numero2} = ?`;
            }

            if (operacao === 'divisao') {
                // Sempre divisão exata (sem resto), adequado ao ensino fundamental.
                const faixasQuociente = { unidades: [1, 9], dezenas: [10, 50], centenas: [50, 150] };
                const [minQ, maxQ] = faixasQuociente[nivel] || faixasQuociente.unidades;
                numero2 = sortear(2, 9); // divisor
                const quociente = sortear(minQ, maxQ);
                numero1 = numero2 * quociente; // dividendo (garante divisão exata)
                respostaCorreta = quociente;
                return `${numero1} ÷ ${numero2} = ?`;
            }

            if (operacao === 'potenciacao') {
                const config = {
                    quadrados: { min: 2, max: 15, expoente: 2, simbolo: '²' },
                    cubos:     { min: 2, max: 10, expoente: 3, simbolo: '³' },
                    potencias: { min: 2, max: 6,  expoente: (Math.random() < 0.5 ? 4 : 5), simbolo: null },
                };
                const c = config[nivel] || config.quadrados;
                numero1 = sortear(c.min, c.max);
                numero2 = c.expoente;
                respostaCorreta = Math.pow(numero1, numero2);
                const sobrescritos = { 2: '²', 3: '³', 4: '⁴', 5: '⁵' };
                return `${numero1}${sobrescritos[numero2]} = ?`;
            }

            // radiciacao (nível único: 'raizes')
            const raiz = sortear(2, 15);
            numero1 = raiz * raiz;
            numero2 = 2;
            respostaCorreta = raiz;
            return `√${numero1} = ?`;
        }

        function novaQuestao() {
            document.getElementById('conta').innerText = gerarQuestao();
            document.getElementById('resposta').value = '';
            document.getElementById('resposta').focus();
            document.getElementById('feedback').innerText = '';
            document.getElementById('feedback').className = 'feedback';
            inicioQuestao = Date.now();
        }

        function salvarJogada(respostaAluno, acertou, tempo) {
            fetch("{% url 'salvar_jogada' %}", {
                method: 'POST',
                keepalive: true,
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    operacao: operacao,
                    nivel: nivel,
                    numero_1: numero1,
                    numero_2: numero2,
                    resposta_aluno: String(respostaAluno),
                    acertou: acertou,
                    tempo_segundos: tempo
                })
            }).catch(err => console.error('Erro ao salvar jogada:', err));
        }

        document.getElementById('form-resposta').addEventListener('submit', function (e) {
            e.preventDefault();
            const campoResposta = document.getElementById('resposta');
            const respostaAluno = parseInt(campoResposta.value, 10);
            const tempo = (Date.now() - inicioQuestao) / 1000;
            const acertou = respostaAluno === respostaCorreta;

            const feedback = document.getElementById('feedback');
            if (acertou) {
                acertos++;
                feedback.innerText = '✅ Certo!';
                feedback.className = 'feedback certo';
            } else {
                feedback.innerText = `❌ Errado! Era ${respostaCorreta}`;
                feedback.className = 'feedback errado';
            }
            document.getElementById('num-acertos').innerText = acertos;

            salvarJogada(campoResposta.value, acertou, tempo);

            questaoAtual++;
            if (questaoAtual >= totalQuestoes) {
                setTimeout(finalizarJogo, 1000);
            } else {
                document.getElementById('num-atual').innerText = questaoAtual + 1;
                setTimeout(novaQuestao, 1000);
            }
        });

        function finalizarJogo() {
            document.getElementById('tela-jogo').style.display = 'none';
            document.getElementById('tela-fim').style.display = 'block';
            document.getElementById('resumo-acertos').innerText = acertos;
        }

        novaQuestao();
    </script>
</body>
</html>
