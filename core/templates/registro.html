<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Portal Educativo</title>
    <style>
        body {
            background-color: #1e293b; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .caixa {
            background-color: #273449; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 320px; text-align: center;
        }
        h1 { font-size: 1.6em; margin-bottom: 25px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            border: none; font-size: 1em; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background-color: #27ae60; color: white; font-size: 1.1em;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: #219a52; }
        .erro { background-color: #e74c3c; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        a { color: #90caf9; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .rodape { margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="caixa">
        <h1>📝 Criar Conta</h1>

        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}

        <form method="POST" action="{% url 'cadastro' %}">
            {% csrf_token %}
            <input type="text" name="nome" placeholder="Nome do aluno" required>
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Cadastrar</button>
        </form>

        <div class="rodape">
            Já tem conta? <a href="{% url 'login' %}">Fazer login</a>
        </div>
    </div>
</body>
</html>
