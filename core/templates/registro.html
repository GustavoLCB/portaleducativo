<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno</title>
    <style>
        body { background-color: #1e3f20; background-image: radial-gradient(rgba(255,255,255,0.03) 15%, transparent 15%), radial-gradient(rgba(255,255,255,0.02) 15%, transparent 15%); background-size: 6px 6px; background-position: 0 0, 3px 3px; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .caixa-login { background-color: rgba(255, 255, 255, 0.1); padding: 40px 50px; border-radius: 20px; box-shadow: 0 15px 25px rgba(0,0,0,0.5); backdrop-filter: blur(5px); border: 2px solid rgba(255, 255, 255, 0.2); text-align: center; width: 100%; max-width: 400px; }
        h1 { font-size: 2.2em; margin-top: 0; margin-bottom: 20px; font-family: 'Courier New', Courier, monospace; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
        .campo { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 1.1em; font-weight: bold; }
        input[type="text"], input[type="password"], input[type="email"] { width: 100%; padding: 12px; font-size: 1.1em; border-radius: 10px; border: none; box-sizing: border-box; background-color: #f0f0f0; outline: none; }
        input:focus { border: 2px solid #00a8ff; background-color: #fff; }
        button { width: 100%; background-color: #2ecc71; color: white; font-size: 1.3em; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: transform 0.1s; margin-top: 10px; }
        button:active { transform: scale(0.95); }
        .erro { color: #ff6b6b; font-weight: bold; margin-bottom: 15px; background-color: rgba(255, 0, 0, 0.1); padding: 10px; border-radius: 8px; }
        .sucesso { color: #00FF00; font-weight: bold; margin-bottom: 15px; background-color: rgba(0, 255, 0, 0.1); padding: 10px; border-radius: 8px; }
        .link-voltar { display: block; margin-top: 20px; color: #ccc; text-decoration: none; font-size: 1em; }
        .link-voltar:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="caixa-login">
        <h1>📝 Novo Aluno</h1>
        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
        {% if sucesso %}<div class="sucesso">{{ sucesso }}</div>{% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="campo">
                <label for="nome">Primeiro Nome:</label>
                <input type="text" id="nome" name="nome" required autocomplete="off">
            </div>
            <div class="campo">
                <label for="email">E-mail do Colégio:</label>
                <input type="email" id="email" name="email" placeholder="aluno@csanl.com.br" required autocomplete="off">
            </div>
            <div class="campo">
                <label for="senha">Crie uma Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <a href="{% url 'login' %}" class="link-voltar">⬅️ Voltar para o Login</a>
    </div>
</body>
</html>
