{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Educação - Login</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            position: relative;
            overflow: hidden;
            background-color: #026873;
        }

        /* Imagem única cobrindo a tela toda (sem repetição = sem "linhas de emenda").
           Esta imagem (imagemfundo1.png) tem resolução boa, então não precisa de blur. */
        .fundo-imagem {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(2, 104, 115, 0.45), rgba(2, 104, 115, 0.45)),
                url('{% static "img/imagemfundo1.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .doodle {
            position: absolute;
            opacity: 0.11;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            z-index: 1;
        }
        .doodle text { fill: #ffffff; stroke: none; font-family: 'Segoe UI', Arial, sans-serif; }

        /* topo */
        .d-lapis1     { top: 3%;   left: 3%;   width: 60px; transform: rotate(-20deg); }
        .d-caneta     { top: 4%;   left: 15%;  width: 55px; transform: rotate(15deg); }
        .d-esquadro1  { top: 3%;   left: 27%;  width: 50px; transform: rotate(6deg); }
        .d-compasso   { top: 3%;   right: 27%; width: 55px; transform: rotate(-8deg); }
        .d-borracha1  { top: 4%;   right: 15%; width: 55px; transform: rotate(-10deg); }
        .d-mochila1   { top: 3%;   right: 3%;  width: 60px; transform: rotate(6deg); }

        /* meio-alto */
        .d-regua      { top: 22%;  left: 2%;   width: 70px; transform: rotate(18deg); }
        .d-grafico    { top: 22%;  right: 2%;  width: 65px; transform: rotate(0deg); }
        .d-oculos     { top: 24%;  left: 88%;  width: 55px; transform: rotate(-6deg); }

        /* meio */
        .d-livro      { top: 42%;  left: 3%;   width: 65px; transform: rotate(-8deg); }
        .d-relogio    { top: 40%;  right: 3%;  width: 55px; transform: rotate(0deg); }
        .d-armario    { top: 46%;  left: 12%;  width: 45px; transform: rotate(4deg); }
        .d-estojo     { top: 46%;  right: 12%; width: 55px; transform: rotate(-4deg); }

        /* meio-baixo */
        .d-formula1   { top: 65%;  left: 4%;   width: 90px; transform: rotate(-4deg); }
        .d-formula2   { top: 66%;  right: 4%;  width: 90px; transform: rotate(3deg); }
        .d-triangulo  { top: 62%;  left: 20%;  width: 45px; transform: rotate(0deg); }
        .d-quadrado   { top: 62%;  right: 20%; width: 42px; transform: rotate(12deg); }

        /* rodapé */
        .d-quadro     { bottom: 4%; left: 3%;  width: 70px; transform: rotate(-6deg); }
        .d-tubo       { bottom: 6%; left: 16%; width: 42px; transform: rotate(10deg); }
        .d-lapis2     { bottom: 3%; left: 30%; width: 45px; transform: rotate(20deg); }
        .d-retangulo  { bottom: 5%; right: 30%; width: 55px; transform: rotate(-8deg); }
        .d-celular    { bottom: 6%; right: 16%; width: 42px; transform: rotate(-8deg); }
        .d-bone       { bottom: 4%; right: 3%;  width: 62px; transform: rotate(10deg); }

        /* extras - preenchendo os espaços que ainda estavam vazios (fora da faixa central, onde fica a caixa) */
        .d-lapis3     { top: 13%;  left: 18%;  width: 40px; transform: rotate(30deg); }
        .d-livro2     { top: 13%;  right: 18%; width: 50px; transform: rotate(10deg); }
        .d-formula3   { top: 30%;  left: 8%;   width: 70px; transform: rotate(-3deg); }
        .d-triangulo2 { top: 32%;  right: 9%;  width: 35px; transform: rotate(15deg); }
        .d-regua2     { top: 55%;  left: 22%;  width: 55px; transform: rotate(-15deg); }
        .d-tubo2      { top: 55%;  right: 22%; width: 35px; transform: rotate(-8deg); }
        .d-quadrado2  { top: 78%;  left: 18%;  width: 32px; transform: rotate(20deg); }
        .d-relogio2   { top: 78%;  right: 18%; width: 40px; transform: rotate(0deg); }
        .d-caneta2    { top: 92%;  left: 9%;   width: 35px; transform: rotate(-25deg); }
        .d-oculos2    { top: 92%;  right: 9%;  width: 45px; transform: rotate(5deg); }

        @media (max-width: 900px) {
            .doodle { display: none; }
        }

        @media (max-width: 380px) {
            .caixa { padding: 30px 20px 25px; }
            h1 { font-size: 1.25em; }
            .emblema { width: 100px; height: 100px; }
        }

        .caixa {
            position: relative;
            z-index: 2;
            background-color: rgba(1, 45, 50, 0.6);
            backdrop-filter: blur(2px);
            border: 2px dashed rgba(255,255,255,0.35);
            border-radius: 20px;
            padding: 45px 40px 35px;
            width: 380px;
            max-width: 92vw; /* nunca estoura a borda da tela, nem em celular pequeno */
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .emblema {
            width: 130px; height: 130px;
            margin: 0 auto 18px;
            position: relative;
        }
        .emblema svg { width: 100%; height: 100%; }

        h1 {
            font-size: 1.5em;
            line-height: 1.3;
            margin: 0 0 28px;
            color: #ffd54f;
            font-weight: bold;
        }

        input {
            width: 100%; padding: 12px 14px; margin-bottom: 14px;
            border-radius: 8px; border: none; font-size: 1em;
            background-color: #fdf6e3; color: #2c3e50;
        }
        input::placeholder { color: #7a7a6a; }

        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background-color: #f4b400; color: #2c1e00; font-size: 1.1em;
            font-weight: bold; cursor: pointer; margin-top: 6px;
            transition: transform 0.15s, background-color 0.15s;
        }
        button:hover { background-color: #ffcb3d; transform: scale(1.03); }

        .erro { background-color: #e74c3c; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .sucesso { background-color: #27ae60; padding: 10px; border-radius: 8px; margin-bottom: 15px; }

        a { color: #ffd54f; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .rodape { margin-top: 22px; font-size: 0.92em; color: #e8e8e0; }
    </style>
</head>
<body>
    <div class="fundo-imagem"></div>


    <!-- Topo -->
    <svg class="doodle d-lapis1" viewBox="0 0 40 120"><path d="M10 10 L30 10 L30 100 L20 115 L10 100 Z M10 10 L10 5 L30 5 L30 10 M10 20 L30 20"/></svg>
    <svg class="doodle d-caneta" viewBox="0 0 30 120"><path d="M12 8 L18 8 L18 95 L15 115 L12 95 Z M8 8 L22 8 L22 20 L8 20 Z"/></svg>
    <svg class="doodle d-esquadro1" viewBox="0 0 100 90"><path d="M5 85 L5 5 L95 85 Z M15 85 L15 25 M25 85 L25 45 M35 85 L35 65"/></svg>
    <svg class="doodle d-compasso" viewBox="0 0 80 100"><path d="M40 10 L15 90 M40 10 L65 90 M25 12 A8 8 0 1 0 41 12 M15 90 L25 90 M65 90 L55 90"/></svg>
    <svg class="doodle d-borracha1" viewBox="0 0 90 45"><rect x="5" y="5" width="80" height="35" rx="8"/><path d="M5 25 L85 25"/></svg>
    <svg class="doodle d-mochila1" viewBox="0 0 80 100"><path d="M20 30 C20 10 60 10 60 30 L60 90 C60 97 20 97 20 90 Z M28 30 L28 10 M52 30 L52 10 M30 50 L50 50 M20 45 L10 45 L10 75 L20 75 M60 45 L70 45 L70 75 L60 75"/></svg>

    <!-- Meio-alto -->
    <svg class="doodle d-regua" viewBox="0 0 120 40"><path d="M5 30 L110 10 L115 25 L10 45 Z M20 26 L23 32 M35 23 L38 29 M50 20 L53 26 M65 17 L68 23 M80 14 L83 20"/></svg>
    <svg class="doodle d-grafico" viewBox="0 0 100 80"><path d="M10 70 L10 10 M10 70 L95 70 M25 70 L25 45 L40 45 L40 70 M45 70 L45 30 L60 30 L60 70 M65 70 L65 55 L80 55 L80 70"/></svg>
    <svg class="doodle d-oculos" viewBox="0 0 100 45"><circle cx="25" cy="22" r="18"/><circle cx="75" cy="22" r="18"/><path d="M43 20 L57 20 M7 18 L2 15 M93 18 L98 15"/></svg>

    <!-- Meio -->
    <svg class="doodle d-livro" viewBox="0 0 100 70"><path d="M5 10 L50 5 L95 10 L95 60 L50 65 L5 60 Z M50 5 L50 65 M15 20 L40 17 M15 30 L40 27 M60 17 L85 20 M60 27 L85 30"/></svg>
    <svg class="doodle d-relogio" viewBox="0 0 80 80"><circle cx="40" cy="40" r="32"/><path d="M40 22 L40 40 L54 48 M40 8 L40 14 M40 66 L40 72 M8 40 L14 40 M66 40 L72 40"/></svg>
    <svg class="doodle d-armario" viewBox="0 0 60 90"><rect x="5" y="5" width="50" height="80" rx="3"/><path d="M30 5 L30 85 M15 40 L15 48 M45 40 L45 48"/></svg>
    <svg class="doodle d-estojo" viewBox="0 0 100 40"><rect x="5" y="8" width="90" height="26" rx="13"/><path d="M20 8 L20 34 M80 8 L80 34"/></svg>

    <!-- Meio-baixo -->
    <svg class="doodle d-formula1" viewBox="0 0 140 40"><text x="5" y="28" font-size="24">a&#178;+b&#178;=c&#178;</text></svg>
    <svg class="doodle d-formula2" viewBox="0 0 140 40"><text x="5" y="28" font-size="24">E = mc&#178;</text></svg>
    <svg class="doodle d-triangulo" viewBox="0 0 60 55"><path d="M30 5 L55 50 L5 50 Z"/></svg>
    <svg class="doodle d-quadrado" viewBox="0 0 50 50"><rect x="5" y="5" width="40" height="40"/></svg>

    <!-- Rodapé -->
    <svg class="doodle d-quadro" viewBox="0 0 100 80"><rect x="10" y="8" width="80" height="55" rx="3"/><path d="M25 63 L15 78 M75 63 L85 78 M30 20 L60 20 M30 32 L55 32"/></svg>
    <svg class="doodle d-tubo" viewBox="0 0 40 100"><path d="M14 5 L26 5 L26 70 C26 85 14 85 14 70 Z M14 55 L26 55 M10 5 L30 5"/></svg>
    <svg class="doodle d-lapis2" viewBox="0 0 40 120"><path d="M10 10 L30 10 L30 100 L20 115 L10 100 Z M10 10 L10 5 L30 5 L30 10 M10 20 L30 20"/></svg>
    <svg class="doodle d-retangulo" viewBox="0 0 70 45"><rect x="5" y="5" width="60" height="35"/></svg>
    <svg class="doodle d-celular" viewBox="0 0 55 95"><rect x="5" y="5" width="45" height="85" rx="8"/><path d="M22 12 L33 12 M27 80 L28 80"/></svg>
    <svg class="doodle d-bone" viewBox="0 0 100 60"><path d="M15 45 C15 20 85 20 85 45 L95 48 L95 40 L85 38 C80 18 20 18 15 38 L5 40 L5 48 Z"/></svg>

    <!-- Extras: preenchendo mais espaços com os mesmos desenhos, em outras posições/tamanhos -->
    <svg class="doodle d-lapis3" viewBox="0 0 40 120"><path d="M10 10 L30 10 L30 100 L20 115 L10 100 Z M10 10 L10 5 L30 5 L30 10 M10 20 L30 20"/></svg>
    <svg class="doodle d-livro2" viewBox="0 0 100 70"><path d="M5 10 L50 5 L95 10 L95 60 L50 65 L5 60 Z M50 5 L50 65 M15 20 L40 17 M15 30 L40 27 M60 17 L85 20 M60 27 L85 30"/></svg>
    <svg class="doodle d-formula3" viewBox="0 0 140 40"><text x="5" y="28" font-size="24">&#960;r&#178;</text></svg>
    <svg class="doodle d-triangulo2" viewBox="0 0 60 55"><path d="M30 5 L55 50 L5 50 Z"/></svg>
    <svg class="doodle d-regua2" viewBox="0 0 120 40"><path d="M5 30 L110 10 L115 25 L10 45 Z M20 26 L23 32 M35 23 L38 29 M50 20 L53 26 M65 17 L68 23 M80 14 L83 20"/></svg>
    <svg class="doodle d-tubo2" viewBox="0 0 40 100"><path d="M14 5 L26 5 L26 70 C26 85 14 85 14 70 Z M14 55 L26 55 M10 5 L30 5"/></svg>
    <svg class="doodle d-quadrado2" viewBox="0 0 50 50"><rect x="5" y="5" width="40" height="40"/></svg>
    <svg class="doodle d-relogio2" viewBox="0 0 80 80"><circle cx="40" cy="40" r="32"/><path d="M40 22 L40 40 L54 48 M40 8 L40 14 M40 66 L40 72 M8 40 L14 40 M66 40 L72 40"/></svg>
    <svg class="doodle d-caneta2" viewBox="0 0 30 120"><path d="M12 8 L18 8 L18 95 L15 115 L12 95 Z M8 8 L22 8 L22 20 L8 20 Z"/></svg>
    <svg class="doodle d-oculos2" viewBox="0 0 100 45"><circle cx="25" cy="22" r="18"/><circle cx="75" cy="22" r="18"/><path d="M43 20 L57 20 M7 18 L2 15 M93 18 L98 15"/></svg>

    <div class="caixa">
        <div class="emblema">
            <!--
                EMBLEMA: pode virar a logomarca do seu colégio quando quiser!
                Basta colocar o arquivo da logo em core/static/img/logo_colegio.png
                e trocar o bloco <svg>...</svg> abaixo por esta linha:

                <img src="{% static 'img/logo_colegio.png' %}"
                     style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
            -->
            <svg viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="78" fill="none" stroke="#f4b400" stroke-width="20" stroke-linecap="round" stroke-dasharray="440 490"/>
                <circle cx="100" cy="100" r="78" fill="none" stroke="#c9302c" stroke-width="20" stroke-linecap="round" stroke-dasharray="26 490" stroke-dashoffset="-414"/>
                <circle cx="100" cy="100" r="78" fill="none" stroke="#7f8c8d" stroke-width="6" stroke-dasharray="10 490" stroke-dashoffset="-440"/>
                <text x="100" y="95" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" font-size="22" fill="#ffffff">Portal</text>
                <text x="100" y="118" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffd54f">Educação</text>
            </svg>
        </div>

        <h1>Bem-vindo ao<br>Portal de Educação</h1>

        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
        {% if sucesso %}<div class="sucesso">{{ sucesso }}</div>{% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="email" name="usuario" placeholder="Login (e-mail)" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        <div class="rodape">
            Ainda não tem conta? <a href="{% url 'cadastro' %}">Cadastre-se</a>
        </div>
    </div>
</body>
</html>
