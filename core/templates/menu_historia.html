{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>História</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; position: relative; background-color: #5c3a21;
            padding: 20px;
        }
        .fundo-imagem {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(92, 58, 33, 0.68), rgba(92, 58, 33, 0.68)),
                url('{% static "img/fundohist.png" %}');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .caixa {
            position: relative; z-index: 2;
            background-color: rgba(40, 25, 14, 0.6);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 20px; padding: 40px 35px; width: 560px; max-width: 92vw;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #ffd54f; font-size: 1.6em; margin-bottom: 28px; }
        .grade-modulos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        a.modulo {
            background-color: #e8e8e0; color: #2b1c10; padding: 22px 10px;
            border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.95em;
            transition: transform 0.15s; display: block; border: 3px solid transparent;
        }
        a.modulo:hover { transform: translateY(-4px); border-color: #f4b400; }
        a.modulo .icone { display: block; font-size: 2.2em; margin-bottom: 8px; }
        a.voltar { display: inline-block; margin-top: 26px; color: #e8e8e0; text-decoration: none; font-size: 0.9em; }
        a.voltar:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .grade-modulos { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="fundo-imagem"></div>
    <div class="caixa">
        <h1>🏛️ História — Escolha o Módulo</h1>
        <div class="grade-modulos">
            <a class="modulo" href="{% url 'historia_quiz' 'primeiras_vilas' %}">
                <span class="icone">🏘️</span>Primeiras Vilas
            </a>
            <a class="modulo" href="{% url 'historia_quiz' 'ciclo_do_ouro' %}">
                <span class="icone">⛏️</span>Ciclo do Ouro
            </a>
            <a class="modulo" href="{% url 'historia_quiz' 'capitais_brasil' %}">
                <span class="icone">🏙️</span>Capitais do Brasil
            </a>
            <a class="modulo" href="{% url 'historia_quiz' 'crescimento_cidades' %}">
                <span class="icone">🏭</span>Crescimento das Cidades
            </a>
            <a class="modulo" href="{% url 'historia_quiz' 'cidadania' %}">
                <span class="icone">⚖️</span>Cidadania
            </a>
        </div>
        <a class="voltar" href="{% url 'home' %}">⬅ Voltar ao início</a>
    </div>
</body>
</html>
