{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ nome_operacao }} - Escolha o Nível</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff; position: relative; background-color: #026873;
            padding: 20px;
        }
        .fundo-imagem {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(2, 104, 115, 0.45), rgba(2, 104, 115, 0.45)),
                url('{% static "img/imagemfundo1.png" %}');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .caixa {
            position: relative; z-index: 2;
            background-color: rgba(1, 45, 50, 0.6);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 20px; padding: 45px 35px; width: 480px; max-width: 92vw;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #ffd54f; font-size: 1.5em; margin-bottom: 30px; }
        .grade-niveis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        a.nivel {
            background-color: #f4b400; color: #2c1e00; padding: 22px 10px;
            border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 1.05em;
            transition: transform 0.15s, background-color 0.15s; display: block;
        }
        a.nivel:hover { background-color: #ffcb3d; transform: scale(1.05); }
        a.voltar { display: inline-block; margin-top: 26px; color: #e8e8e0; text-decoration: none; font-size: 0.9em; }
        a.voltar:hover { text-decoration: underline; }
        @media (max-width: 420px) {
            .grade-niveis { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="fundo-imagem"></div>
    <div class="caixa">
        <h1>{{ icone_operacao }} {{ nome_operacao }} — Escolha o Nível</h1>
        <div class="grade-niveis">
            {% for valor, rotulo in niveis %}
                <a class="nivel" href="{% url 'jogo_tabuada' operacao valor %}">{{ rotulo }}</a>
            {% endfor %}
        </div>
        <a class="voltar" href="{% url 'menu_operacoes' %}">⬅ Escolher outra operação</a>
    </div>
</body>
</html>
